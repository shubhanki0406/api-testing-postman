name: Run API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection with Report
        run: npm install -g newman-reporter-htmlextra newman run MyFirstAPICollection.json -r htmlextra --reporter-htmlextra-export report.html
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: API-Test-Report
          path: report.html
